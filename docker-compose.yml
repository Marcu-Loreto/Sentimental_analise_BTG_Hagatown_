# docker-compose.yml
version: '3.8'

services:
  # Redis - Estado compartilhado
  redis:
    image: redis:7-alpine
    container_name: atendimento_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    networks:
      - atendimento_network

  # FastAPI - API de mensagens
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: atendimento_api
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - API_KEY=${API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-4.1-nano}
      - OPENAI_SENTIMENT_MODEL=${OPENAI_SENTIMENT_MODEL:-gpt-4o-mini}
      - POSTGRES_HOST=${POSTGRES_HOST:-postgres}
      - POSTGRES_PORT=5432
      - POSTGRES_DB=${POSTGRES_DB:-atendimento_db}
      - POSTGRES_USER=${POSTGRES_USER:-atendimento_user}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-atendimento_pass}
      - NEO4J_URI=${NEO4J_URI}
      - NEO4J_USERNAME=${NEO4J_USERNAME}
      - NEO4J_PASSWORD=${NEO4J_PASSWORD}
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - atendimento_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Streamlit - App principal (chat + insights)
  streamlit:
    build:
      context: .
      dockerfile: Dockerfile.streamlit
    container_name: atendimento_streamlit
    restart: unless-stopped
    ports:
      - "8502:8502"
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-4.1-nano}
      - OPENAI_SENTIMENT_MODEL=${OPENAI_SENTIMENT_MODEL:-gpt-4o-mini}
      - POSTGRES_HOST=${POSTGRES_HOST:-postgres}
      - POSTGRES_PORT=5432
      - POSTGRES_DB=${POSTGRES_DB:-atendimento_db}
      - POSTGRES_USER=${POSTGRES_USER:-atendimento_user}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-atendimento_pass}
      - NEO4J_URI=${NEO4J_URI}
      - NEO4J_USERNAME=${NEO4J_USERNAME}
      - NEO4J_PASSWORD=${NEO4J_PASSWORD}
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      api:
        condition: service_healthy
    networks:
      - atendimento_network

  # Dashboard N8N - Painel de sentimentos
  dashboard:
    build:
      context: .
      dockerfile: Dockerfile.dashboard
    container_name: atendimento_dashboard
    restart: unless-stopped
    ports:
      - "8503:8503"
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-4.1-nano}
      - OPENAI_SENTIMENT_MODEL=${OPENAI_SENTIMENT_MODEL:-gpt-4o-mini}
      - POSTGRES_HOST=${POSTGRES_HOST:-postgres}
      - POSTGRES_PORT=5432
      - POSTGRES_DB=${POSTGRES_DB:-atendimento_db}
      - POSTGRES_USER=${POSTGRES_USER:-atendimento_user}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-atendimento_pass}
      - NEO4J_URI=${NEO4J_URI}
      - NEO4J_USERNAME=${NEO4J_USERNAME}
      - NEO4J_PASSWORD=${NEO4J_PASSWORD}
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - atendimento_network

  # PostgreSQL
  postgres:
    image: postgres:15-alpine
    container_name: atendimento_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-atendimento_db}
      POSTGRES_USER: ${POSTGRES_USER:-atendimento_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-atendimento_pass}
    ports:
      - "5435:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-atendimento_user}"]
      interval: 10s
      timeout: 3s
      retries: 3
    networks:
      - atendimento_network

  # Nginx - Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: atendimento_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - api
      - streamlit
      - dashboard
    networks:
      - atendimento_network

volumes:
  redis_data:
  pgdata:

networks:
  atendimento_network:
    driver: bridge
